version: '3.8'

services:
  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: complaint_portal
      POSTGRES_USER: complaint_user
      POSTGRES_PASSWORD: complaint_password
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SECRET_KEY: django-insecure-dev-key-change-in-production
      DATABASE_URL: postgresql://complaint_user:complaint_password@db:5432/complaint_portal
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost,http://127.0.0.1
    depends_on:
      - db

volumes:
  postgres_data:
  static_volume:
  media_volume:
