# Netlify configuration for the University Complaint Portal frontend

[build]
  # The root of the repo is the frontend (index.html lives here)
  publish = "."

# Redirect all page navigations to the correct HTML files
# This ensures direct links (e.g. /pages/login.html) work properly
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
