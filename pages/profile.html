<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - University Complaint Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body class="dashboard-body">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shield-alt"></i>
            <div>
                <h3>ComplaintPortal</h3>
                <span id="sidebarUserType">User Panel</span>
            </div>
        </div>
        <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <h4 id="sidebarUserName">User Name</h4>
                <span id="sidebarUserEmail">user@email.com</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a href="dashboard.html" id="navDashboard">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="submit-complaint.html" class="student-only">
                <i class="fas fa-plus-circle"></i>
                <span>New Complaint</span>
            </a>
            <div class="nav-section">Account</div>
            <a href="profile.html" class="active">
                <i class="fas fa-user-cog"></i>
                <span>Profile Settings</span>
            </a>
            <a href="#" id="navNotifications">
                <i class="fas fa-bell"></i>
                <span>Notifications</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="logout-link">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
        <div class="top-header">
            <h1>Profile Settings</h1>
            <div class="top-header-right">
                <div class="notification-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-dot"></span>
                </div>
            </div>
        </div>

        <!-- Profile Content -->
        <div class="dashboard-grid">
            <!-- Profile Information Card -->
            <div class="dashboard-card">
                <div class="dashboard-card-header">
                    <h3><i class="fas fa-user" style="margin-right:8px; color:var(--primary-light);"></i> Profile Information</h3>
                    <button class="btn btn-sm btn-secondary" onclick="document.getElementById('profileForm').reset()">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
                <div class="dashboard-card-body">
                    <form id="profileForm" class="profile-form-section">
                        <div class="form-group">
                            <label>Full Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="profileName" placeholder="Enter your full name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="profileEmail" placeholder="Enter your email" disabled>
                                <small style="color:var(--text-secondary); display:block; margin-top:4px;">Email cannot be changed</small>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-wrapper">
                                <i class="fas fa-at"></i>
                                <input type="text" id="profileUsername" placeholder="Username" disabled>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Account Type</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user-tag"></i>
                                <input type="text" id="profileUserType" placeholder="User Type" disabled>
                            </div>
                        </div>
                        <div class="form-group student-only">
                            <label>Student ID</label>
                            <div class="input-wrapper">
                                <i class="fas fa-id-card"></i>
                                <input type="text" id="profileStudentId" placeholder="Student ID">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <div class="input-wrapper">
                                <i class="fas fa-phone"></i>
                                <input type="tel" id="profilePhone" placeholder="Enter your phone number">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>

            <!-- Change Password Card -->
            <div class="dashboard-card">
                <div class="dashboard-card-header">
                    <h3><i class="fas fa-lock" style="margin-right:8px; color:var(--warning);"></i> Change Password</h3>
                </div>
                <div class="dashboard-card-body">
                    <form id="passwordForm" class="profile-form-section">
                        <div class="form-group">
                            <label>Current Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="currentPassword" placeholder="Enter current password" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="newPassword" placeholder="Enter new password" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-key"></i> Change Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        // ===== PROFILE PAGE FUNCTIONALITY =====
        
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            
            // Load user profile
            loadUserProfile();
            
            // Setup sidebar navigation
            setupSidebarNavigation();
            
            // Setup logout
            setupLogout();
            
            // Setup forms
            document.getElementById('profileForm').addEventListener('submit', updateProfile);
            document.getElementById('passwordForm').addEventListener('submit', changePassword);
        });
        
        function loadUserProfile() {
            const user = getCurrentUser();
            if (!user) return;
            
            // Update sidebar
            document.getElementById('sidebarUserName').textContent = 
                (user.first_name || user.username);
            document.getElementById('sidebarUserEmail').textContent = user.email;
            document.getElementById('sidebarAvatar').textContent = 
                (user.first_name || user.username).charAt(0).toUpperCase();
            document.getElementById('sidebarUserType').textContent = 
                user.user_type === 'admin' ? 'Admin Panel' : 'Student Panel';
            
            // Update profile form
            document.getElementById('profileName').value = 
                (user.first_name || '') + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('profileEmail').value = user.email;
            document.getElementById('profileUsername').value = user.username;
            document.getElementById('profileUserType').value = 
                user.user_type === 'admin' ? 'Administrator' : 'Student';
            document.getElementById('profileStudentId').value = user.student_id || '';
            document.getElementById('profilePhone').value = user.phone_number || '';
            
            // Show/hide student-specific fields
            if (user.user_type !== 'student') {
                document.querySelectorAll('.student-only').forEach(el => {
                    el.style.display = 'none';
                });
            }
            
            // Update navigation links based on user type
            const navDashboard = document.getElementById('navDashboard');
            if (navDashboard) {
                navDashboard.href = user.user_type === 'admin' ? 
                    'admin-dashboard.html' : 'student-dashboard.html';
            }
        }
        
        function setupSidebarNavigation() {
            const user = getCurrentUser();
            if (!user) return;
            
            // Update dashboard link
            const navDashboard = document.getElementById('navDashboard');
            if (navDashboard) {
                navDashboard.href = user.user_type === 'admin' ? 
                    'admin-dashboard.html' : 'student-dashboard.html';
            }
        }
        
        function setupLogout() {
            document.querySelectorAll('.logout-link').forEach(link => {
                link.addEventListener('click', async function(e) {
                    e.preventDefault();
                    if (confirm('Are you sure you want to logout?')) {
                        try {
                            await apiLogout();
                        } catch (error) {
                            console.error('Logout error:', error);
                        } finally {
                            clearAuthToken();
                            window.location.href = 'login.html';
                        }
                    }
                });
            });
        }
        
        async function updateProfile(e) {
            e.preventDefault();
            
            const name = document.getElementById('profileName').value.trim();
            const nameParts = name.split(' ');
            const phone = document.getElementById('profilePhone').value.trim();
            const studentId = document.getElementById('profileStudentId').value.trim();
            
            const updateData = {
                first_name: nameParts[0] || '',
                last_name: nameParts.slice(1).join(' ') || '',
                phone_number: phone
            };
            
            // Add student_id only for students
            const user = getCurrentUser();
            if (user && user.user_type === 'student') {
                updateData.student_id = studentId;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/update_profile/`, {
                    method: 'PUT',
                    headers: getHeaders(true),
                    body: JSON.stringify(updateData)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw {
                        message: data.message || 'Failed to update profile'
                    };
                }
                
                // Update localStorage
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    loadUserProfile();
                }
                
                showAlert('Profile updated successfully!', 'success');
            } catch (error) {
                showAlert(error.message || 'Failed to update profile', 'error');
            }
        }
        
        async function changePassword(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            
            if (newPassword !== confirmNewPassword) {
                showAlert('New passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/change_password/`, {
                    method: 'POST',
                    headers: getHeaders(true),
                    body: JSON.stringify({
                        old_password: currentPassword,
                        new_password: newPassword,
                        confirm_password: confirmNewPassword
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw {
                        message: data.message || data.old_password?.[0] || 'Failed to change password'
                    };
                }
                
                // Update token if provided
                if (data.token) {
                    setAuthToken(data.token);
                }
                
                // Clear password fields
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';
                
                showAlert('Password changed successfully!', 'success');
            } catch (error) {
                showAlert(error.message || 'Failed to change password', 'error');
            }
        }
    </script>
</body>
</html>
