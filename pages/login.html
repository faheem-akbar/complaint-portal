<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - University Complaint Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>Complaint<span class="gradient-text">Portal</span></span>
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="about.html">About</a>
                <a href="login.html" class="active">Login</a>
                <a href="register.html">Register</a>
            </div>
            <div class="nav-buttons">
                <a href="login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="register.html" class="btn btn-secondary"><i class="fas fa-user-plus"></i> Register</a>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <!-- ===== LOGIN SECTION ===== -->
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-illustration">
                <i class="fas fa-user-graduate"></i>
                <h2>Welcome Back!</h2>
                <p>Sign in to your account to submit and track your complaints.</p>
            </div>
            <div class="auth-form">
                <div class="form-header">
                    <h2>Sign In</h2>
                    <p>Enter your credentials to access your account.</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your university email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="remember"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                <div class="form-footer">
                    Don't have an account? <a href="register.html">Create one here</a>
                </div>
            </div>
        </div>
    </section>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
