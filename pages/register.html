<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - University Complaint Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>Complaint<span class="gradient-text">Portal</span></span>
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="about.html">About</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="active">Register</a>
            </div>
            <div class="nav-buttons">
                <a href="login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="register.html" class="btn btn-secondary"><i class="fas fa-user-plus"></i> Register</a>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <!-- ===== REGISTER SECTION ===== -->
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-illustration">
                <i class="fas fa-user-plus"></i>
                <h2>Join Us Today!</h2>
                <p>Create your account and start submitting complaints online.</p>
            </div>
            <div class="auth-form">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Fill in your details to register.</p>
                </div>
                <form id="registerForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="name" placeholder="Enter your full name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Account Type</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-tag"></i>
                            <select id="userType" required>
                                <option value="student">Student</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="studentIdGroup">
                        <label>Student ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="studentId" placeholder="Enter your student ID">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your university email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Create a strong password" required>
                        </div>
                        <div class="password-strength">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                        <p class="password-hint">Use at least 6 characters with numbers and symbols for a strong password.</p>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>
                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="agree"> I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div class="form-footer">
                    Already have an account? <a href="login.html">Sign in here</a>
                </div>
            </div>
        </div>
    </section>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        // Show/hide student ID field based on user type
        document.addEventListener('DOMContentLoaded', function() {
            const userTypeSelect = document.getElementById('userType');
            const studentIdGroup = document.getElementById('studentIdGroup');
            
            if (userTypeSelect && studentIdGroup) {
                // Initial state
                studentIdGroup.style.display = userTypeSelect.value === 'student' ? 'block' : 'none';
                
                // Toggle on change
                userTypeSelect.addEventListener('change', function() {
                    studentIdGroup.style.display = this.value === 'student' ? 'block' : 'none';
                });
            }
        });
    </script>
</body>
</html>
